name: Publish Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish plugin
        run: |
          dotnet publish Jellyfin.Plugin.Pdf/Jellyfin.Plugin.Pdf.csproj \
            -c Release \
            --output ./publish_output \
            --nologo

      - name: Package plugin zip
        run: |
          mkdir -p ./artifacts
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          ZIPNAME="jellyfin-plugin-pdf_${VERSION}.zip"

          pushd ./publish_output
          zip -r "../artifacts/${ZIPNAME}" \
            Jellyfin.Plugin.Pdf.dll \
            PDFtoImage.dll \
            SkiaSharp.dll \
            meta.json \
            thumb.png \
            runtimes/
          popd

          echo "ARTIFACT=./artifacts/${ZIPNAME}" >> "$GITHUB_ENV"
          echo "FILENAME=${ZIPNAME}" >> "$GITHUB_ENV"

      - name: Create GitHub Release and upload zip
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT }}
          generate_release_notes: true

      - name: Update manifest.json
        run: |
          python3 - <<'EOF'
          import json, hashlib, sys, os
          from datetime import datetime, timezone

          artifact  = os.environ['ARTIFACT']
          dl_url    = os.environ['DOWNLOAD_URL']
          meta_path = 'Jellyfin.Plugin.Pdf/meta.json'
          manifest_path = 'manifest.json'

          # MD5 checksum (Jellyfin requirement)
          h = hashlib.md5()
          with open(artifact, 'rb') as f:
              for chunk in iter(lambda: f.read(8192), b''):
                  h.update(chunk)
          checksum = h.hexdigest()

          with open(meta_path) as f:
              meta = json.load(f)

          try:
              with open(manifest_path) as f:
                  manifest = json.load(f)
          except (FileNotFoundError, json.JSONDecodeError):
              manifest = []

          plugin = next((p for p in manifest if p['guid'] == meta['guid']), None)
          if plugin is None:
              plugin = {
                  'guid': meta['guid'],
                  'name': meta['name'],
                  'description': meta['description'],
                  'overview': meta['overview'],
                  'owner': meta['owner'],
                  'category': meta['category'],
                  'imageUrl': meta.get('imageUrl'),
                  'versions': []
              }
              manifest.append(plugin)

          new_version = {
              'version': meta['version'],
              'changelog': meta['changelog'],
              'targetAbi': meta['targetAbi'],
              'sourceUrl': dl_url,
              'checksum': checksum,
              'timestamp': datetime.now(timezone.utc).strftime('%Y-%m-%dT%H:%M:%S') + 'Z'
          }
          plugin['versions'] = [v for v in plugin['versions'] if v['version'] != meta['version']]
          plugin['versions'].insert(0, new_version)

          with open(manifest_path, 'w') as f:
              json.dump(manifest, f, indent=4)

          print(f"Manifest updated: version={meta['version']} url={dl_url} checksum={checksum}")
          EOF
        env:
          ARTIFACT: ${{ env.ARTIFACT }}
          DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.FILENAME }}

      - name: Commit and push manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet && echo "manifest unchanged" && exit 0
          git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git diff --staged --quiet && echo "manifest unchanged" && exit 0
          git commit -m "chore: update manifest for ${{ github.ref_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
