<!DOCTYPE html>
<html>
<head>
    <title>PDF Thumbnails</title>
</head>
<body>
    <div id="PdfThumbnailsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
         data-require="emby-input,emby-button">
        <div data-role="content">
            <div class="content-primary">
                <form id="PdfThumbnailsConfigForm">
                    <div class="formDialogContent">
                        <div class="dialogContentInner">
                            <div class="inputContainer">
                                <label class="inputLabel" for="RenderResolutionDpi">
                                    Render Resolution (DPI)
                                </label>
                                <input id="RenderResolutionDpi" name="RenderResolutionDpi"
                                       type="number" is="emby-input"
                                       min="36" max="600" step="1" />
                                <div class="fieldDescription">
                                    Controls the quality of generated PDF thumbnails.
                                    Higher values produce sharper images but increase processing time.
                                    Valid range: 36–600. Default: 150.
                                </div>
                            </div>
                        </div>
                    </div>
                    <div>
                        <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                            <span>Save</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        var PdfThumbnailsConfig = {
            pluginUniqueId: 'a5e3a6c8-2d4b-4f3e-9c1a-7b8d6e5f4a2c'
        };

        document.querySelector('#PdfThumbnailsConfigPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PdfThumbnailsConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#RenderResolutionDpi').value = config.RenderResolutionDpi || 150;
                    Dashboard.hideLoadingMsg();
                });
            });

        document.querySelector('#PdfThumbnailsConfigForm')
            .addEventListener('submit', function (e) {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(PdfThumbnailsConfig.pluginUniqueId).then(function (config) {
                    config.RenderResolutionDpi = parseInt(document.querySelector('#RenderResolutionDpi').value) || 150;
                    ApiClient.updatePluginConfiguration(PdfThumbnailsConfig.pluginUniqueId, config).then(function () {
                        Dashboard.processPluginConfigurationUpdateResult();
                    });
                });
                e.preventDefault();
                return false;
            });
    </script>
</body>
</html>
