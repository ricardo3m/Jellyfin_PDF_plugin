name: "PDF Thumbnails"
guid: "a5e3a6c8-2d4b-4f3e-9c1a-7b8d6e5f4a2c"
version: "1.0.1.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Generates thumbnail images from the first page of PDF files."
description: >
  Automatically generates cover thumbnails for PDF files in your Jellyfin library
  by rendering the first page of each PDF. Supports configurable render resolution
  (DPI) and thumbnail padding mode (white, transparent, or no padding).
category: "General"
owner: "ricardo3m"
artifacts:
  - "Jellyfin.Plugin.Pdf.dll"
  - "PDFtoImage.dll"
changelog: |-
  - Fix SkiaSharp version conflict causing fatal crash
  - Downgrade PDFtoImage to 5.0.0 (compatible with Jellyfin's SkiaSharp 3.116)
  - Exclude SkiaSharp from plugin bundle; use Jellyfin's copy
  - Use byte array decode to eliminate SKManagedStream finalizer risk
