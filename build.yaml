name: "PDF Thumbnails"
guid: "a5e3a6c8-2d4b-4f3e-9c1a-7b8d6e5f4a2c"
version: "1.0.3.0"
targetAbi: "10.11.0.0"
framework: "net9.0"
overview: "Generates thumbnail images from the first page of PDF files."
description: >
  Automatically generates cover thumbnails for PDF files in your Jellyfin library
  by rendering the first page of each PDF. Supports configurable render resolution
  (DPI) and thumbnail padding mode (white, transparent, or no padding).
category: "General"
owner: "ricardo3m"
artifacts:
  - "Jellyfin.Plugin.Pdf.dll"
  - "PDFtoImage.dll"
changelog: |-
  - Fix: avoid blocking Jellyfin's thread pool during PDF rendering
  - GetImageResponse now offloads synchronous PDF rendering to Task.Run
  - EnsureThumbnailExistsAsync is now properly async (was fake-async)
  - PDF rendering now respects CancellationToken
  - Fix: pageStream MemoryStream is now properly disposed after use
